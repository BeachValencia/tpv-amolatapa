<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPV | AmoLaTapa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --rojo-tapa: #c83228;
            --amarillo-sur: #eeb030;
            --fondo: #f4f6f8;
            --blanco: #ffffff;
            --texto: #333333;
        }
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--fondo); display: flex; height: 100vh; overflow: hidden; color: var(--texto); }
        
        /* ESTRUCTURA 3 COLUMNAS */
        .col-familias { width: 15%; background: #2c3e50; color: white; display: flex; flex-direction: column; overflow-y: auto; }
        .col-productos { width: 55%; padding: 15px; overflow-y: auto; }
        .col-ticket { width: 30%; background: var(--blanco); border-left: 2px solid #ddd; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.05); }

        /* BOTONES FAMILIAS */
        .btn-familia { background: none; border: none; color: white; padding: 20px 10px; text-align: left; font-size: 16px; border-bottom: 1px solid #34495e; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .btn-familia:hover, .btn-familia.activo { background: var(--rojo-tapa); border-left: 5px solid var(--amarillo-sur); }

        /* GRID PRODUCTOS */
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .btn-producto { background: var(--blanco); border: 2px solid #eee; border-radius: 8px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; height: 120px;}
        .btn-producto:active { transform: scale(0.95); border-color: var(--amarillo-sur); }
        .prod-nombre { font-size: 15px; font-weight: bold; }
        .prod-precio { color: var(--rojo-tapa); font-size: 18px; font-weight: bold; margin-top: 10px;}

        /* TICKET */
        .ticket-header { padding: 15px; background: #eee; text-align: center; font-weight: bold; font-size: 18px; border-bottom: 1px solid #ddd;}
        .ticket-lineas { flex: 1; overflow-y: auto; padding: 10px; }
        .linea { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px dashed #ccc; font-size: 15px;}
        .ticket-footer { padding: 15px; background: #fafafa; border-top: 2px solid #ddd; }
        .total-box { display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; color: var(--rojo-tapa); margin-bottom: 15px;}
        .btn-cobrar { background: #2e7d32; color: white; border: none; width: 100%; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-cobrar:hover { background: #1b5e20; }

        @media (max-width: 800px) {
            body { flex-direction: column; }
            .col-familias { width: 100%; height: 60px; flex-direction: row; }
            .btn-familia { padding: 15px; border-bottom: none; border-right: 1px solid #34495e; text-align: center; flex: 1; white-space: nowrap;}
            .col-productos { width: 100%; flex: 1; }
            .col-ticket { width: 100%; height: 35vh; border-left: none; border-top: 2px solid #ddd; }
        }
    </style>
</head>
<body>

    <div class="col-familias">
        <button class="btn-familia activo">🍺 Bebidas</button>
        <button class="btn-familia">🍤 Tapas</button>
        <button class="btn-familia">🥘 Raciones</button>
        <button class="btn-familia">🍰 Postres</button>
    </div>

    <div class="col-productos">
        <h2 style="margin-top:0;">Bebidas</h2>
        <div class="grid-productos">
            <div class="btn-producto">
                <span class="prod-nombre">Caña Turia</span>
                <span class="prod-precio">1.80 €</span>
            </div>
            <div class="btn-producto">
                <span class="prod-nombre">Copa Turia</span>
                <span class="prod-precio">2.50 €</span>
            </div>
            <div class="btn-producto">
                <span class="prod-nombre">Agua Mineral</span>
                <span class="prod-precio">1.50 €</span>
            </div>
            <div class="btn-producto">
                <span class="prod-nombre">Vino Rioja (Copa)</span>
                <span class="prod-precio">2.80 €</span>
            </div>
        </div>
    </div>

    <div class="col-ticket">
        <div class="ticket-header">
            Mesa 4 <span style="font-weight:normal; font-size:14px; color:#666;">(Terraza)</span>
        </div>
        <div class="ticket-lineas">
            <div class="linea">
                <span>2x Caña Turia</span>
                <span>3.60 €</span>
            </div>
            <div class="linea">
                <span>1x Bravas AmoLaTapa</span>
                <span>5.50 €</span>
            </div>
        </div>
        <div class="ticket-footer">
            <div class="total-box">
                <span>TOTAL:</span>
                <span>9.10 €</span>
            </div>
            <button class="btn-cobrar">💶 COBRAR MESA</button>
        </div>
    </div>

    <script>
        // Aquí conectaremos Supabase muy pronto usando tus llaves
        console.log("¡Interfaz del TPV cargada y lista para conectar a SQL!");
    </script>
</body>
</html>
